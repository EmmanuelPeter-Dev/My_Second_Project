<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='form.css'>
</head>

<body>
    <div class="form-container">
        <h1>Voter's Card Registration</h1>

        <form id="registrationForm">
            <div class="form-field">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="form-field">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="form-field">
                <label for="otherName">Other Name</label>
                <input type="text" id="otherName" name="otherName">
            </div>

            <div class="form-field">
                <label for="stateOfOrigin">State of Origin</label>
                <select id="stateOfOrigin" name="stateOfOrigin" required>
                    <option value="" disabled selected>Select State</option>
                </select>
            </div>

            <div class="form-field">
                <label for="lga">LGA</label>
                <select id="lga" name="lga" required disabled>
                    <option value="" disabled selected>Select State First </option>
                </select>
            </div>

            <div class="form-field">
                <label for="pollingUnit">Polling Unit</label>
                <select id="pollingUnit" name="pollingUnit" required disabled>
                    <option value="" disabled selected>Select LGA First</option>
                </select>
            </div>

            <button type="submit">Register</button>

        </form>
    </div>

    <!-- <script src="lga.js"></script> -->
    <script src="form.js">
        
    </script>
    <script>
        const registrationForm = document.querySelector("#registrationForm");
    
        registrationForm.addEventListener("submit", function (event) {
            event.preventDefault();
    
            const formData = new FormData(registrationForm);
    
            for (const [key, value] of formData.entries()) {
                console.log(key, value);
            }
    
            alert("Congrats. Registration successful!");
        });
    </script>
</body>

</html>
